name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild build -project mdql.xcodeproj -scheme mdql -destination "platform=macOS" | xcpretty || xcodebuild build -project mdql.xcodeproj -scheme mdql -destination "platform=macOS"

      - name: Run tests
        run: xcodebuild test -project mdql.xcodeproj -scheme mdqlTests -destination "platform=macOS" | xcpretty || xcodebuild test -project mdql.xcodeproj -scheme mdqlTests -destination "platform=macOS"
