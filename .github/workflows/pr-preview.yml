name: PR QuickLook Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  quicklook-preview:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mdql-screenshot
        run: |
          xcodebuild \
            -project mdql.xcodeproj \
            -scheme mdql-screenshot \
            -configuration Release \
            -destination 'platform=macOS' \
            build 2>&1 | tail -5

      - name: Generate preview screenshot
        run: |
          BUILT=$(xcodebuild -project mdql.xcodeproj -scheme mdql-screenshot -configuration Release \
            -showBuildSettings 2>/dev/null | grep ' BUILT_PRODUCTS_DIR' | awk '{print $NF}')
          mkdir -p assets/screenshots
          "$BUILT/mdql-screenshot" mdqlTests/Fixtures/front-matter.md assets/screenshots/pr-preview.png 1200 900

      - name: Commit screenshot to PR branch
        run: |
          git config user.name "Lars"
          git config user.email "l@larskluge.com"
          git add assets/screenshots/pr-preview.png
          git diff --staged --quiet || git commit -m "ci: update QuickLook preview screenshot [skip ci]"
          git push

      - name: Comment on PR with screenshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/assets/screenshots/pr-preview.png?$(date +%s)"
          gh pr comment "$PR_NUMBER" --body "## QuickLook Preview

          ![QuickLook Preview](${IMAGE_URL})

          *Auto-generated from the QuickLook extension build on this PR.*"
