name: PR QuickLook Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  quicklook-preview:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mdql.app (Release)
        run: |
          xcodebuild \
            -project mdql.xcodeproj \
            -scheme mdql \
            -configuration Release \
            -destination 'platform=macOS' \
            build 2>&1 | tail -5

      - name: Install QuickLook extension
        run: |
          BUILT=$(xcodebuild -project mdql.xcodeproj -scheme mdql -configuration Release \
            -showBuildSettings 2>/dev/null | grep ' BUILT_PRODUCTS_DIR' | awk '{print $NF}')
          echo "Built products dir: $BUILT"
          SKIP_LAUNCH=1 bash scripts/install.sh "$BUILT"
          APPEX=$(find "$HOME/Applications/mdql.app" -name "*.appex" | head -1)
          echo "Extension: $APPEX"
          pluginkit -a "$APPEX" || true
          sleep 3
          qlmanage -r
          sleep 2

      - name: Generate QuickLook screenshot
        run: |
          mkdir -p /tmp/ql-preview
          if [ -f "mdqlTests/Fixtures/front-matter.md" ]; then
            PREVIEW_FILE="$(pwd)/mdqlTests/Fixtures/front-matter.md"
          else
            printf '%s\n' '---' 'author: Lars' 'date: 2026-03-18' 'draft: false' 'title: My Document' '---' '' '# Hello World' '' 'This document has front matter.' > /tmp/preview-sample.md
            PREVIEW_FILE="/tmp/preview-sample.md"
          fi
          echo "Rendering: $PREVIEW_FILE"
          qlmanage -t -s 1200 -o /tmp/ql-preview "$PREVIEW_FILE" 2>&1 || true
          ls -la /tmp/ql-preview/ || echo "No output"

      - name: Copy screenshot to repo
        run: |
          mkdir -p assets/screenshots
          SHOT=$(ls /tmp/ql-preview/*.png 2>/dev/null | head -1)
          if [ -n "$SHOT" ]; then
            cp "$SHOT" assets/screenshots/pr-preview.png
            echo "Screenshot saved"
          else
            echo "No screenshot generated by qlmanage"
            exit 1
          fi

      - name: Commit screenshot to PR branch
        run: |
          git config user.name "Lars"
          git config user.email "l@larskluge.com"
          git add assets/screenshots/pr-preview.png
          git diff --staged --quiet || git commit -m "ci: update QuickLook preview screenshot [skip ci]"
          git push

      - name: Comment on PR with screenshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/assets/screenshots/pr-preview.png?$(date +%s)"
          gh pr comment "$PR_NUMBER" --body "## QuickLook Preview

          ![QuickLook Preview](${IMAGE_URL})

          *Auto-generated from the QuickLook extension build on this PR.*"
